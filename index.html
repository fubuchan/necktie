<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>父子相伝ネクタイバトン</title>

  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #f7f5f2;
      color: #222;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans",
        "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    }

    .page {
      width: 100%;
      max-width: 430px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }

    .title {
      margin: 0 0 8px;
      font-size: 24px;
      line-height: 1.4;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .lead {
      margin: 0 0 18px;
      color: #666;
      font-size: 13px;
      line-height: 1.7;
    }

    .card {
      background: #fff;
      border: 1px solid #e9e2da;
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04);
      margin-bottom: 16px;
    }

    .step-indicator {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }

    .step-pill {
      flex: 1;
      text-align: center;
      font-size: 11px;
      padding: 8px 0;
      border-radius: 999px;
      background: #ece7e0;
      color: #8b8177;
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    .step-pill.active {
      background: #b74a45;
      color: #fff;
    }

    .section-label {
      margin: 0 0 12px;
      font-size: 11px;
      color: #8a8076;
      letter-spacing: 0.08em;
      font-weight: 700;
    }

    .field {
      margin-bottom: 12px;
    }

    .field label {
      display: block;
      margin-bottom: 6px;
      font-size: 12px;
      color: #666;
    }

    input,
    select,
    textarea,
    button {
      font: inherit;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid #d9d1c7;
      border-radius: 12px;
      background: #fff;
      padding: 12px 14px;
      color: #222;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: #b74a45;
      box-shadow: 0 0 0 3px rgba(183, 74, 69, 0.12);
    }

    textarea {
      min-height: 88px;
      resize: vertical;
    }

    .button-wrap {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 16px;
    }

    .row-buttons {
      display: flex;
      gap: 10px;
    }

    .row-buttons button {
      flex: 1;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 999px;
      padding: 14px 18px;
      background: #b74a45;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    button.secondary {
      background: #2f2f2f;
    }

    button.ghost {
      background: #ece7e0;
      color: #5d554f;
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .status {
      font-size: 12px;
      color: #777;
      text-align: center;
    }

    .status.ok {
      color: #1b7c42;
    }

    .status.ng {
      color: #b74a45;
    }

    .screen {
      display: none;
    }

    .screen.active {
      display: block;
      animation: fadeIn 0.25s ease;
    }

    #loading {
      display: none;
      margin-top: 10px;
      text-align: center;
      font-size: 13px;
      color: #b74a45;
    }

    .camera-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 3 / 4;
      background: #111;
      border-radius: 16px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #111;
    }

    .guide-box {
      position: absolute;
      width: 52%;
      height: 56%;
      border: 2px dashed rgba(255,255,255,0.85);
      border-radius: 12px;
      left: 50%;
      top: 52%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .guide-text {
      margin-top: 12px;
      font-size: 12px;
      color: #666;
      line-height: 1.7;
      text-align: center;
    }

    .capture-preview-wrap {
      margin-top: 14px;
      display: none;
    }

    .capture-preview-wrap.show {
      display: block;
    }

    .capture-preview {
      width: 100%;
      border-radius: 14px;
      border: 1px solid #e7dfd8;
      display: block;
    }

    .result-area {
      display: none;
    }

    .result-area.show {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    .result-card {
      background: #fff;
      border: 1px solid #e9e2da;
      border-radius: 18px;
      padding: 18px 16px 20px;
    }

    .result-mini {
      font-size: 11px;
      color: #8a8076;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
      font-weight: 700;
      text-align: center;
    }

    .result-title {
      font-size: 30px;
      line-height: 1.4;
      font-weight: 700;
      color: #b74a45;
      margin: 0 0 10px;
      text-align: center;
    }

    .result-description {
      font-size: 14px;
      line-height: 1.9;
      color: #444;
      white-space: pre-wrap;
      text-align: center;
      margin-bottom: 16px;
    }

    .preview-wrap {
      background: #f4f0eb;
      border-radius: 14px;
      padding: 14px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 220px;
      border: 1px solid #ece5de;
    }

    #resultPreview {
      width: 100%;
      max-width: 320px;
      height: auto;
      display: block;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 10px 24px rgba(0,0,0,0.08);
    }

    .result-meta {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid #efe8e1;
      font-size: 12px;
      line-height: 1.8;
      color: #666;
      text-align: center;
    }

    .debug {
      margin-top: 14px;
      background: #faf8f5;
      border: 1px solid #ece6df;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 11px;
      line-height: 1.7;
      color: #666;
      white-space: pre-wrap;
      word-break: break-word;
    }

    canvas {
      display: none;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <main class="page">
    <h1 class="title">父子相伝ネクタイバトン</h1>
    <p class="lead">
      父の情報と自分の情報を入力し、ネクタイを撮影すると、TouchDesignerが結び名とビジュアルを生成します。
    </p>

    <div class="step-indicator">
      <div class="step-pill active" id="pill1">STEP 1 入力</div>
      <div class="step-pill" id="pill2">STEP 2 撮影</div>
      <div class="step-pill" id="pill3">STEP 3 結果</div>
    </div>

    <!-- STEP 1 -->
    <section class="card screen active" id="screen1">
      <p class="section-label">INPUT</p>

      <form id="tieForm">
        <div class="field">
          <label for="user_name">あなたの名前</label>
          <input id="user_name" placeholder="例：清水楓吹樹" />
        </div>

        <div class="field">
          <label for="user_city">あなたの居住地</label>
          <input id="user_city" placeholder="例：福岡" />
        </div>

        <div class="field">
          <label for="user_job">あなたの仕事</label>
          <input id="user_job" placeholder="例：会社員" />
        </div>

        <div class="field">
          <label for="father_name">父の名前</label>
          <input id="father_name" placeholder="例：清水" />
        </div>

        <div class="field">
          <label for="father_city">父の居住地</label>
          <input id="father_city" placeholder="例：広島" />
        </div>

        <div class="field">
          <label for="father_job">父の仕事</label>
          <input id="father_job" placeholder="例：営業職" />
        </div>

        <div class="field">
          <label for="learned_from_father">結び方について</label>
          <select id="learned_from_father">
            <option value="yes">父に教わった</option>
            <option value="no">父に教わっていない</option>
          </select>
        </div>

        <div class="field">
          <label for="tie_note">補足</label>
          <textarea id="tie_note" placeholder="例：毎朝無意識に結んでいる / 就職のときに父に教わった"></textarea>
        </div>

        <div class="button-wrap">
          <button type="button" id="goToCameraBtn">次へ</button>
          <div id="wsStatus" class="status">WebSocket接続中...</div>
        </div>
      </form>
    </section>

    <!-- STEP 2 -->
    <section class="card screen" id="screen2">
      <p class="section-label">CAPTURE</p>

      <div class="camera-wrap">
        <video id="camera" autoplay playsinline muted></video>
        <div class="guide-box"></div>
      </div>

      <p class="guide-text">
        首元とネクタイの結び目が、ガイドの中央に入るように合わせてください。
      </p>

      <div class="capture-preview-wrap" id="capturePreviewWrap">
        <img id="capturePreview" class="capture-preview" alt="撮影プレビュー" />
      </div>

      <canvas id="captureCanvas"></canvas>

      <div class="button-wrap">
        <div class="row-buttons">
          <button type="button" class="ghost" id="backToFormBtn">戻る</button>
          <button type="button" id="captureBtn">撮影する</button>
        </div>
        <button type="button" class="secondary" id="sendBtn" disabled>この写真で生成する</button>
      </div>

      <div id="loading">生成中です…</div>
    </section>

    <!-- STEP 3 -->
    <section class="result-area" id="resultArea">
      <div class="result-card">
        <div class="result-mini">FATHER'S DAY RESULT</div>
        <h2 class="result-title" id="tieName">---</h2>
        <div class="result-description" id="tieDescription">---</div>

        <div class="preview-wrap">
          <img id="resultPreview" alt="生成プレビュー" />
        </div>

        <div class="result-meta" id="resultMeta">---</div>
      </div>

      <div class="button-wrap">
        <button type="button" class="secondary" id="downloadBtn">PDFをダウンロード</button>
        <button type="button" class="ghost" id="restartBtn">もう一度やる</button>
      </div>

      <div class="debug" id="debugLog">まだ結果はありません。</div>
    </section>
  </main>

  <script>
    const WS_URL = "wss://necktie.onrender.com";

    const screen1 = document.getElementById("screen1");
    const screen2 = document.getElementById("screen2");
    const resultArea = document.getElementById("resultArea");

    const pill1 = document.getElementById("pill1");
    const pill2 = document.getElementById("pill2");
    const pill3 = document.getElementById("pill3");

    const wsStatus = document.getElementById("wsStatus");
    const loading = document.getElementById("loading");

    const goToCameraBtn = document.getElementById("goToCameraBtn");
    const backToFormBtn = document.getElementById("backToFormBtn");
    const captureBtn = document.getElementById("captureBtn");
    const sendBtn = document.getElementById("sendBtn");
    const restartBtn = document.getElementById("restartBtn");
    const downloadBtn = document.getElementById("downloadBtn");

    const camera = document.getElementById("camera");
    const captureCanvas = document.getElementById("captureCanvas");
    const capturePreviewWrap = document.getElementById("capturePreviewWrap");
    const capturePreview = document.getElementById("capturePreview");

    const tieNameEl = document.getElementById("tieName");
    const tieDescriptionEl = document.getElementById("tieDescription");
    const resultPreview = document.getElementById("resultPreview");
    const resultMeta = document.getElementById("resultMeta");
    const debugLog = document.getElementById("debugLog");

    let ws = null;
    let mediaStream = null;
    let capturedImage = "";
    let lastImageSrc = "";

    function setStep(step) {
      screen1.classList.remove("active");
      screen2.classList.remove("active");
      resultArea.classList.remove("show");

      pill1.classList.remove("active");
      pill2.classList.remove("active");
      pill3.classList.remove("active");

      if (step === 1) {
        screen1.classList.add("active");
        pill1.classList.add("active");
      } else if (step === 2) {
        screen2.classList.add("active");
        pill2.classList.add("active");
      } else if (step === 3) {
        resultArea.classList.add("show");
        pill3.classList.add("active");
      }
    }

    function updateStatus(text, type = "") {
      wsStatus.textContent = text;
      wsStatus.className = "status";
      if (type) wsStatus.classList.add(type);
    }

    function setLoading(isLoading) {
      loading.style.display = isLoading ? "block" : "none";
      sendBtn.disabled = isLoading || !capturedImage;
    }

    function getFormData() {
      return {
        user_name: document.getElementById("user_name").value,
        user_city: document.getElementById("user_city").value,
        user_job: document.getElementById("user_job").value,
        father_name: document.getElementById("father_name").value,
        father_city: document.getElementById("father_city").value,
        father_job: document.getElementById("father_job").value,
        learned_from_father: document.getElementById("learned_from_father").value,
        tie_note: document.getElementById("tie_note").value
      };
    }

    function connectWebSocket() {
      ws = new WebSocket(WS_URL);

      ws.onopen = () => {
        updateStatus("接続済み", "ok");
        console.log("🟢 WebSocket接続成功");
      };

      ws.onclose = () => {
        updateStatus("切断されました", "ng");
        console.log("🔌 WebSocket切断");
      };

      ws.onerror = (e) => {
        updateStatus("接続エラー", "ng");
        console.log("❌ WebSocketエラー", e);
      };

      ws.onmessage = (event) => {
        console.log("📩 WebSocket受信:", event.data);

        let data;
        try {
          data = JSON.parse(event.data);
        } catch (err) {
          console.error("JSON parse error:", err);
          return;
        }

        if (data.type === "tie_result" || data.type === "tie_overlay") {
          setLoading(false);

          tieNameEl.textContent = data.tie_name || "無名結び";
          tieDescriptionEl.textContent = data.tie_description || "説明文がありません。";

          if (data.image && data.image.trim() !== "") {
            lastImageSrc = "data:image/png;base64," + data.image;
            resultPreview.src = lastImageSrc;
          } else {
            lastImageSrc = capturedImage || "";
            resultPreview.src = lastImageSrc;
          }

          resultMeta.textContent =
            `user: ${data.user_name || "—"} / father: ${data.father_name || "—"} / learned: ${data.learned_from_father || "—"}`;

          debugLog.textContent =
            `結び名: ${data.tie_name || ""}\n` +
            `説明文: ${data.tie_description || ""}\n` +
            `user_name: ${data.user_name || ""}\n` +
            `father_name: ${data.father_name || ""}\n` +
            `learned_from_father: ${data.learned_from_father || ""}`;

          stopCamera();
          setStep(3);
        }
      };
    }

    async function startCamera() {
      try {
        mediaStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "user" },
          audio: false
        });
        camera.srcObject = mediaStream;
      } catch (err) {
        alert("カメラを起動できませんでした。ブラウザのカメラ許可を確認してください。");
        console.error(err);
      }
    }

    function stopCamera() {
      if (mediaStream) {
        mediaStream.getTracks().forEach(track => track.stop());
        mediaStream = null;
      }
      camera.srcObject = null;
    }

    function captureImageFromVideo() {
      const videoWidth = camera.videoWidth;
      const videoHeight = camera.videoHeight;

      if (!videoWidth || !videoHeight) {
        alert("カメラ映像がまだ準備できていません。");
        return;
      }

      captureCanvas.width = videoWidth;
      captureCanvas.height = videoHeight;

      const ctx = captureCanvas.getContext("2d");
      ctx.drawImage(camera, 0, 0, videoWidth, videoHeight);

      capturedImage = captureCanvas.toDataURL("image/png");
      capturePreview.src = capturedImage;
      capturePreviewWrap.classList.add("show");
      sendBtn.disabled = false;
    }

    function sendFormAndImage() {
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        updateStatus("未接続のため送信できません", "ng");
        return;
      }

      if (!capturedImage) {
        alert("先にネクタイを撮影してください。");
        return;
      }

      const payload = {
        type: "tie_input_with_image",
        ...getFormData(),
        captured_image: capturedImage
      };

      console.log("📤 送信:", {
  ...payload,
  captured_image: payload.captured_image ? `[base64 ${payload.captured_image.length} chars]` : ""
});

      setLoading(true);
      ws.send(JSON.stringify(payload));
    }

    goToCameraBtn.addEventListener("click", async () => {
      setStep(2);
      await startCamera();
    });

    backToFormBtn.addEventListener("click", () => {
      stopCamera();
      setStep(1);
    });

    captureBtn.addEventListener("click", () => {
      captureImageFromVideo();
    });

    sendBtn.addEventListener("click", () => {
      sendFormAndImage();
    });

    restartBtn.addEventListener("click", async () => {
      capturedImage = "";
      lastImageSrc = "";
      capturePreviewWrap.classList.remove("show");
      capturePreview.removeAttribute("src");
      resultPreview.removeAttribute("src");
      setStep(1);
    });

    downloadBtn.addEventListener("click", () => {
      const { jsPDF } = window.jspdf;

      if (!lastImageSrc) {
        alert("ダウンロードできる画像がまだありません。");
        return;
      }

      const img = new Image();
      img.src = lastImageSrc;

      img.onload = () => {
        const imgWidth = img.naturalWidth;
        const imgHeight = img.naturalHeight;

        const pdf = new jsPDF({
          orientation: imgWidth > imgHeight ? "landscape" : "portrait",
          unit: "px",
          format: [imgWidth, imgHeight]
        });

        pdf.addImage(lastImageSrc, "PNG", 0, 0, imgWidth, imgHeight);
        pdf.save("necktie_result.pdf");
      };

      img.onerror = () => {
        alert("画像の読み込みに失敗しました。");
      };
    });

    connectWebSocket();
  </script>
</body>
</html>
