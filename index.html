<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>父子相伝ネクタイバトン</title>

  <!-- PDF生成用 -->
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #f7f5f2;
      color: #222;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans",
        "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    }

    .page {
      width: 100%;
      max-width: 430px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }

    .title {
      margin: 0 0 8px;
      font-size: 24px;
      line-height: 1.4;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .lead {
      margin: 0 0 20px;
      color: #666;
      font-size: 13px;
      line-height: 1.7;
    }

    .card {
      background: #fff;
      border: 1px solid #e9e2da;
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04);
      margin-bottom: 16px;
    }

    .section-label {
      margin: 0 0 12px;
      font-size: 11px;
      color: #8a8076;
      letter-spacing: 0.08em;
      font-weight: 700;
    }

    .field {
      margin-bottom: 12px;
    }

    .field:last-child {
      margin-bottom: 0;
    }

    .field label {
      display: block;
      margin-bottom: 6px;
      font-size: 12px;
      color: #666;
    }

    input,
    select,
    textarea,
    button {
      font: inherit;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid #d9d1c7;
      border-radius: 12px;
      background: #fff;
      padding: 12px 14px;
      color: #222;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: #b74a45;
      box-shadow: 0 0 0 3px rgba(183, 74, 69, 0.12);
    }

    textarea {
      min-height: 88px;
      resize: vertical;
    }

    .button-wrap {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 16px;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 999px;
      padding: 14px 18px;
      background: #b74a45;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    button:hover {
      opacity: 0.94;
    }

    button:active {
      transform: translateY(1px);
    }

    button.secondary {
      background: #2f2f2f;
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .status {
      font-size: 12px;
      color: #777;
      text-align: center;
    }

    .status.ok {
      color: #1b7c42;
    }

    .status.ng {
      color: #b74a45;
    }

    #loading {
      display: none;
      margin-top: 10px;
      text-align: center;
      font-size: 13px;
      color: #b74a45;
    }

    #resultArea {
      display: none;
      animation: fadeIn 0.35s ease;
    }

    .result-capture {
      background: #fff;
      border: 1px solid #e9e2da;
      border-radius: 18px;
      padding: 18px 16px 20px;
    }

    .result-top {
      text-align: center;
      margin-bottom: 14px;
    }

    .result-mini {
      font-size: 11px;
      color: #8a8076;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .result-title {
      font-size: 28px;
      line-height: 1.4;
      font-weight: 700;
      color: #b74a45;
      margin: 0 0 10px;
      word-break: keep-all;
    }

    .result-description {
      font-size: 14px;
      line-height: 1.9;
      color: #444;
      white-space: pre-wrap;
      text-align: center;
    }

    .preview-wrap {
      margin-top: 16px;
      background: #f4f0eb;
      border-radius: 14px;
      padding: 14px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 220px;
      border: 1px solid #ece5de;
    }

    #preview {
      width: 100%;
      max-width: 320px;
      height: auto;
      display: block;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
    }

    .result-meta {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid #efe8e1;
      font-size: 12px;
      line-height: 1.8;
      color: #666;
      text-align: center;
    }

    .download-actions {
      margin-top: 14px;
    }

    .debug {
      margin-top: 14px;
      background: #faf8f5;
      border: 1px solid #ece6df;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 11px;
      line-height: 1.7;
      color: #666;
      white-space: pre-wrap;
      word-break: break-word;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (min-width: 768px) {
      .page {
        max-width: 520px;
        padding-top: 28px;
      }

      .title {
        font-size: 28px;
      }

      .result-title {
        font-size: 32px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <h1 class="title">父子相伝ネクタイバトン</h1>
    <p class="lead">
      父の情報と自分の情報を入力すると、TouchDesignerが結び名とビジュアルを生成します。
    </p>

    <section class="card">
      <p class="section-label">INPUT</p>

      <form id="tieForm">
        <div class="field">
          <label for="user_name">あなたの名前</label>
          <input id="user_name" placeholder="例：清水楓吹樹" />
        </div>

        <div class="field">
          <label for="user_city">あなたの居住地</label>
          <input id="user_city" placeholder="例：福岡" />
        </div>

        <div class="field">
          <label for="user_job">あなたの仕事</label>
          <input id="user_job" placeholder="例：会社員" />
        </div>

        <div class="field">
          <label for="father_name">父の名前</label>
          <input id="father_name" placeholder="例：清水" />
        </div>

        <div class="field">
          <label for="father_city">父の居住地</label>
          <input id="father_city" placeholder="例：広島" />
        </div>

        <div class="field">
          <label for="father_job">父の仕事</label>
          <input id="father_job" placeholder="例：営業職" />
        </div>

        <div class="field">
          <label for="learned_from_father">結び方について</label>
          <select id="learned_from_father">
            <option value="yes">父に教わった</option>
            <option value="no">父に教わっていない</option>
          </select>
        </div>

        <div class="field">
          <label for="tie_note">補足</label>
          <textarea id="tie_note" placeholder="例：毎朝無意識に結んでいる / 就職のときに父に教わった"></textarea>
        </div>

        <div class="button-wrap">
          <button type="submit" id="submitBtn">生成する</button>
          <div id="wsStatus" class="status">WebSocket接続中...</div>
        </div>

        <div id="loading">生成中です…</div>
      </form>
    </section>

    <section id="resultArea">
      <div id="captureArea" class="result-capture">
        <div class="result-top">
          <div class="result-mini">FATHER'S DAY RESULT</div>
          <h2 class="result-title" id="tieName">---</h2>
          <div class="result-description" id="tieDescription">---</div>
        </div>

        <div class="preview-wrap">
          <img id="preview" alt="生成プレビュー" />
        </div>

        <div class="result-meta" id="resultMeta">
          ---
        </div>
      </div>

      <div class="download-actions">
        <button type="button" class="secondary" id="downloadBtn">PDFをダウンロード</button>
      </div>

      <div class="debug" id="debugLog">まだ結果はありません。</div>
    </section>
  </main>

  <script>
    const WS_URL = "wss://necktie.onrender.com";

    const tieForm = document.getElementById("tieForm");
    const submitBtn = document.getElementById("submitBtn");
    const wsStatus = document.getElementById("wsStatus");
    const loading = document.getElementById("loading");

    const resultArea = document.getElementById("resultArea");
    const captureArea = document.getElementById("captureArea");
    const tieNameEl = document.getElementById("tieName");
    const tieDescriptionEl = document.getElementById("tieDescription");
    const previewEl = document.getElementById("preview");
    const resultMeta = document.getElementById("resultMeta");
    const debugLog = document.getElementById("debugLog");
    const downloadBtn = document.getElementById("downloadBtn");

    let ws = null;
    let lastImageSrc = "";

    function updateStatus(text, type = "") {
      wsStatus.textContent = text;
      wsStatus.className = "status";
      if (type) wsStatus.classList.add(type);
    }

    function setLoading(isLoading) {
      loading.style.display = isLoading ? "block" : "none";
      submitBtn.disabled = isLoading;
    }

    function connectWebSocket() {
      ws = new WebSocket(WS_URL);

      ws.onopen = () => {
        console.log("🟢 WebSocket接続成功");
        updateStatus("接続済み", "ok");
      };

      ws.onclose = () => {
        console.log("🔌 WebSocket切断");
        updateStatus("切断されました", "ng");
      };

      ws.onerror = (e) => {
        console.log("❌ WebSocketエラー", e);
        updateStatus("接続エラー", "ng");
      };

      ws.onmessage = (event) => {
        console.log("📩 WebSocket受信:", event.data);

        let data;
        try {
          data = JSON.parse(event.data);
        } catch (err) {
          console.error("JSON parse error:", err);
          return;
        }

        if (data.type === "tie_result" || data.type === "tie_overlay") {
          setLoading(false);

          tieNameEl.textContent = data.tie_name || "無名結び";
          tieDescriptionEl.textContent =
            data.tie_description || "説明文がありません。";

          if (data.image && data.image.trim() !== "") {
            lastImageSrc = "data:image/png;base64," + data.image;
            previewEl.src = lastImageSrc;
          } else {
            lastImageSrc = "";
            previewEl.removeAttribute("src");
          }

          resultMeta.textContent =
            `user: ${data.user_name || "—"} / father: ${data.father_name || "—"} / learned: ${data.learned_from_father || "—"}`;

          debugLog.textContent =
            `結び名: ${data.tie_name || ""}\n` +
            `説明文: ${data.tie_description || ""}\n` +
            `user_name: ${data.user_name || ""}\n` +
            `father_name: ${data.father_name || ""}\n` +
            `learned_from_father: ${data.learned_from_father || ""}`;

          resultArea.style.display = "block";
          resultArea.scrollIntoView({ behavior: "smooth", block: "start" });
        }
      };
    }

    connectWebSocket();

    tieForm.addEventListener("submit", (e) => {
      e.preventDefault();

      const payload = {
        type: "tie_input",
        user_name: document.getElementById("user_name").value,
        user_city: document.getElementById("user_city").value,
        user_job: document.getElementById("user_job").value,
        father_name: document.getElementById("father_name").value,
        father_city: document.getElementById("father_city").value,
        father_job: document.getElementById("father_job").value,
        learned_from_father: document.getElementById("learned_from_father").value,
        tie_note: document.getElementById("tie_note").value
      };

      console.log("📤 送信:", payload);

      if (!ws || ws.readyState !== WebSocket.OPEN) {
        updateStatus("未接続のため送信できません", "ng");
        return;
      }

      resultArea.style.display = "none";
      setLoading(true);
      ws.send(JSON.stringify(payload));
    });

   downloadBtn.addEventListener("click", () => {
  const { jsPDF } = window.jspdf;

  if (!lastImageSrc) {
    alert("ダウンロードできる画像がまだありません。");
    return;
  }

  const img = new Image();
  img.src = lastImageSrc;

  img.onload = () => {
    const imgWidth = img.naturalWidth;
    const imgHeight = img.naturalHeight;

    const pdf = new jsPDF({
      orientation: imgWidth > imgHeight ? "landscape" : "portrait",
      unit: "px",
      format: [imgWidth, imgHeight]
    });

    pdf.addImage(lastImageSrc, "PNG", 0, 0, imgWidth, imgHeight);
    pdf.save("necktie_result.pdf");
  };

  img.onerror = () => {
    alert("画像の読み込みに失敗しました。");
  };
});
  </script>
</body>
</html>
